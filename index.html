<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo List App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#667eea,#764ba2);
      padding:20px;
    }

    .container{
      width:400px;
      max-width:100%;
      background:white;
      padding:25px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    .input-section{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    input{
      flex:1;
      padding:10px;
      border:2px solid #ddd;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    input:focus{
      border-color:#667eea;
    }

    button{
      padding:10px 15px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .add-btn{
      background:#667eea;
      color:white;
    }

    .add-btn:hover{
      background:#5563d6;
    }

    ul{
      list-style:none;
    }

    li{
      background:#f4f4f4;
      margin-bottom:10px;
      padding:12px;
      border-radius:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .task-text{
      flex:1;
      margin-right:10px;
      word-break:break-word;
    }

    .btn-group{
      display:flex;
      gap:5px;
    }

    .edit-btn{
      background:#ffc107;
      color:black;
    }

    .delete-btn{
      background:#dc3545;
      color:white;
    }

    .clear-btn{
      width:100%;
      margin-top:15px;
      background:#333;
      color:white;
    }

    .edit-btn:hover{
      background:#e0a800;
    }

    .delete-btn:hover{
      background:#c82333;
    }

    .clear-btn:hover{
      background:#111;
    }

    /* ========= MOBILE RESPONSIVE ========= */

    @media(max-width:500px){

      .container{
        width:100%;
        padding:20px;
      }

      .input-section{
        flex-direction:column;
      }

      .add-btn{
        width:100%;
      }

      li{
        flex-direction:column;
        align-items:flex-start;
      }

      .task-text{
        margin-right:0;
      }

      .btn-group{
        width:100%;
        display:flex;
      }

      .btn-group button{
        flex:1;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Todo List</h1>

    <div class="input-section">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter task"
      >

      <button
        class="add-btn"
        onclick="addTask()"
      >
        Add
      </button>

    </div>

    <ul id="taskList"></ul>

    <button
      class="clear-btn"
      onclick="clearAll()"
    >
      Clear All
    </button>

  </div>

  <script>

    function addTask(){

      let input =
      document.getElementById("taskInput");

      let taskText =
      input.value.trim();

      if(taskText === ""){

        alert("Please enter a task");

        return;
      }

      let li =
      document.createElement("li");

      li.innerHTML = `

        <span class="task-text">
          ${taskText}
        </span>

        <div class="btn-group">

          <button
            class="edit-btn"
            onclick="editTask(this)"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            onclick="deleteTask(this)"
          >
            Delete
          </button>

        </div>

      `;

      document
      .getElementById("taskList")
      .appendChild(li);

      input.value = "";
    }

    function deleteTask(button){

      button
      .parentElement
      .parentElement
      .remove();

    }

    function editTask(button){

      let li =
      button.parentElement.parentElement;

      let task =
      li.querySelector(".task-text");

      let newTask =
      prompt(
        "Edit your task:",
        task.innerText
      );

      if(
        newTask !== null &&
        newTask.trim() !== ""
      ){

        task.innerText = newTask;

      }

    }

    function clearAll(){

      document
      .getElementById("taskList")
      .innerHTML = "";

    }

  </script>

</body>
</html>
